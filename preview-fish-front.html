<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fish Front — KidsTrail</title>
<style>
body{margin:0;min-height:100vh;background:#1a1a1a;font-family:system-ui;padding:16px;color:#eee}
.wrap{max-width:600px;margin:0 auto;text-align:center}
h1{font-size:16px;margin:0 0 12px}
.stage{background:repeating-conic-gradient(#3a3a3a 0 25%, #1a1a1a 0 50%) 0/24px 24px;border-radius:18px;overflow:hidden;aspect-ratio:9/16;width:100%;max-width:480px;margin:0 auto}
#anim{width:100%;height:100%}
.meta{font-size:12px;opacity:.6;margin-top:8px}
.hint{font-size:11px;opacity:.5;margin-top:4px}
</style></head>
<body><div class="wrap">
<h1>fish/front.json — sand-floor/big-seaweed/fish-school/bubbles (renders IN FRONT of fish)</h1>
<div class="stage"><div id="anim"></div></div>
<div class="meta" id="meta">loading…</div>
<div class="hint">checkered bg = transparent areas (will show back.json + character through)</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script>
const A = lottie.loadAnimation({container:document.getElementById("anim"),renderer:"canvas",loop:true,autoplay:true,path:"assets/fish/front.json?t="+Date.now(),rendererSettings:{preserveAspectRatio:"xMidYMid slice",clearCanvas:true,dpr:window.devicePixelRatio||2}});
A.addEventListener("DOMLoaded",()=>document.getElementById("meta").textContent=`${A.totalFrames}f @ ${A.frameRate}fps · ${(A.totalFrames/A.frameRate).toFixed(2)}s`);
</script></body></html>
