<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flower Back — KidsTrail</title>
<style>
body{margin:0;min-height:100vh;background:#eaf4dc;font-family:system-ui;padding:16px;color:#3a4a2a}
.wrap{max-width:600px;margin:0 auto;text-align:center}
h1{font-size:16px;margin:0 0 12px}
.stage{background:#fff;border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.08);overflow:hidden;aspect-ratio:9/16;width:100%;max-width:480px;margin:0 auto}
#anim{width:100%;height:100%}
.meta{font-size:12px;opacity:.6;margin-top:8px}
</style></head>
<body><div class="wrap">
<h1>flower/back.json — sky/hills/trees/vines (renders BEHIND hero flower)</h1>
<div class="stage"><div id="anim"></div></div>
<div class="meta" id="meta">loading…</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script>
const A = lottie.loadAnimation({container:document.getElementById("anim"),renderer:"canvas",loop:true,autoplay:true,path:"assets/flower/back.json?t="+Date.now(),rendererSettings:{preserveAspectRatio:"xMidYMid slice",clearCanvas:true,dpr:window.devicePixelRatio||2}});
A.addEventListener("DOMLoaded",()=>document.getElementById("meta").textContent=`${A.totalFrames}f @ ${A.frameRate}fps · ${(A.totalFrames/A.frameRate).toFixed(2)}s`);
</script></body></html>
